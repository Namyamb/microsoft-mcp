version: "3.9"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
    volumes:
      - ./chat.db:/app/chat.db
      - ./.outlook_msal_token_cache.bin:/app/.outlook_msal_token_cache.bin
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
